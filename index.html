<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eid Mubarak</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black overflow-hidden">

<!-- Fireworks Canvas -->
<canvas id="fireworks" class="absolute top-0 left-0 w-full h-full"></canvas>

<!-- Content -->
<div class="relative z-10 text-center px-4 sm:px-8
            flex flex-col justify-center items-center
            min-h-screen">
  <h1 class="text-4xl sm:text-5xl md:text-6xl text-white font-bold mb-4">
    Eid Mubarak🌙
  </h1>

  <p class="text-yellow-300 text-lg sm:text-xl mb-6">
    From Husna Shaoib 💖
  </p>

  <a href="greeting.html"
     class="bg-yellow-400 px-6 py-2 sm:px-8 sm:py-3 rounded-full font-bold hover:bg-yellow-500 transition text-sm sm:text-base">
     Next ➡️ Greeting
  </a>
</div>

<script>
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework(x, y) {
  for (let i = 0; i < 100; i++) { // more particles
    particles.push({
      x: x,
      y: y,
      angle: Math.random() * 2 * Math.PI,
      speed: Math.random() * 8 + 4 // faster speed
    });
  }
}

function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.15)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach((p, i) => {
    p.x += Math.cos(p.angle) * p.speed;
    p.y += Math.sin(p.angle) * p.speed;
    p.speed *= 0.96;

    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = `hsl(${Math.random()*360},100%,60%)`;
    ctx.fill();

    if (p.speed < 0.5) particles.splice(i, 1);
  });

  requestAnimationFrame(animate);
}

setInterval(() => {
  createFirework(
    Math.random() * canvas.width,
    Math.random() * canvas.height / 2
  );
}, 700);

animate();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
